name: Routing Live Post Merge

on:
  push:
    branches: [main]
    paths:
      - "app/cli/interactive_shell/routing/**"
      - "tests/cli/interactive_shell/routing/**"
      - "pytest.ini"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/routing-live-post-merge.yml"
  workflow_dispatch:
    inputs:
      shard_indexes:
        description: "Comma-separated shard indexes to run (0-4)"
        required: false
        default: "0,1,2,3,4"

permissions:
  contents: read

concurrency:
  group: routing-live-post-merge-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  routing-live:
    name: routing-live shard ${{ matrix.shard_index }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard_index: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('[{0}]', github.event.inputs.shard_indexes) || '[0, 1, 2, 3, 4]') }}

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      LLM_PROVIDER: openai
      OPENSRE_DISABLE_KEYRING: "1"
      ROUTING_SHARD_TOTAL: "5"
      ROUTING_SHARD_INDEX: ${{ matrix.shard_index }}
      PYTHONUTF8: "1"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Validate live LLM credential wiring
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "::error::OPENAI_API_KEY is missing for live routing tests."
            exit 1
          fi

      - name: Run sharded live routing suite
        run: >-
          uv run python -m pytest -n auto -v
          -m live_llm
          app/cli/interactive_shell/routing/tests/test_routing_scenarios.py
          -k "test_live_turn_execution_oracle or test_live_action_planning"
